name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install -r dashboard/requirements.txt

      - name: Collect tests
        run: pytest --collect-only -q

      - name: Run lightweight tests
        run: pytest tests/unit/test_dashboard_sync_runtime.py tests/unit/test_maintenance_registry.py -q

      - name: Run Silver unit tests
        run: |
          pytest \
            tests/unit/test_silver_ratings.py \
            tests/unit/test_silver_tags.py \
            tests/unit/test_silver_movies.py \
            tests/unit/test_silver_links.py \
            tests/unit/test_silver_genome_scores.py \
            tests/unit/test_silver_genome_tags.py \
            -q

      - name: Run Delta integration tests
        run: pytest tests/integration -q

name: Sync KPIs from S3 to Streamlit

on:
  # This allows you to trigger the workflow manually from the GitHub Actions UI
  workflow_dispatch:
  
  # Optional: Schedule sync every day at 12:00 PM UTC
  schedule:
    - cron: '0 12 * * *'

jobs:
  sync_data:
    runs-on: ubuntu-latest
    
    # We need contents:write permission to push commits back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytz

      - name: Run S3 Data Sync Script
        env:
          # These map to your GitHub Repository Secrets
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }} 
        run: |
          python dashboard/services/sync_data.py

      - name: Commit and Push Changes if Any
        run: |
          # Configure Git as a GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the data directory
          git add dashboard/data/
          
          # Check if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(data): auto-sync KPI parquet files from S3"
            git push
            echo "Successfully synced and pushed new data."
          else
            echo "No changes in data. Skipping push."
          fi
